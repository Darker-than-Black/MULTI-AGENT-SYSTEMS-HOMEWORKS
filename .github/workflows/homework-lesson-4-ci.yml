name: homework-lesson-4-ci

on:
  push:
    paths:
      - "homework-lesson-4/**"
      - ".github/workflows/homework-lesson-4-ci.yml"
  pull_request:
    paths:
      - "homework-lesson-4/**"
      - ".github/workflows/homework-lesson-4-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: homework-lesson-4
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: homework-lesson-4/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Architecture invariants
        run: npm run invariant:check

      - name: Block validations
        run: npm run block:check:all
